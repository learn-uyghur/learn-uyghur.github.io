<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<title>大眾維語・學習小遊戲</title>
<style>
  :root{
    --plaster:#E9DCC0; --panel:#F3EAD5;
    --ink:#2A1A22; --ink-soft:#7A6470;
    --mulberry:#46122F; --mulberry-2:#2E0C20;
    --pome:#C23A2B; --lapis:#176E86; --saffron:#E2A11C;
    --emerald:#2E7D5B; --silk:#B23A86;
    --line:rgba(42,26,34,.16); --line-strong:rgba(42,26,34,.30);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Familjen Grotesk','PingFang TC','Hiragino Sans','Noto Sans CJK TC','Microsoft JhengHei',sans-serif;
    background:var(--plaster);color:var(--ink);min-height:100vh;
    background-image:
      radial-gradient(circle at 16% 10%, rgba(178,58,134,.05), transparent 42%),
      radial-gradient(circle at 86% 80%, rgba(23,110,134,.05), transparent 46%);
  }
  .uy{font-family:'Scheherazade New','Geeza Pro','Noto Naskh Arabic',serif;direction:rtl;unicode-bidi:isolate;line-height:1.5;}

  /* ── etles ikat spine (signature) ── */
  .etles-spine{
    position:fixed;top:0;left:0;bottom:0;width:18px;z-index:50;pointer-events:none;
    background:
      repeating-linear-gradient(-45deg, rgba(0,0,0,.14) 0 5px, transparent 5px 10px),
      repeating-linear-gradient(45deg, rgba(255,255,255,.10) 0 5px, transparent 5px 10px),
      repeating-linear-gradient(180deg,
        var(--pome) 0 26px, var(--saffron) 26px 50px, var(--panel) 50px 60px,
        var(--emerald) 60px 86px, var(--lapis) 86px 112px, var(--panel) 112px 122px,
        var(--silk) 122px 150px, var(--mulberry) 150px 176px, var(--panel) 176px 186px);
    box-shadow:1px 0 0 var(--line-strong), 3px 0 12px rgba(42,26,34,.18);
  }
  @media(max-width:640px){.etles-spine{width:9px;}}

  .wrap{max-width:880px;margin:0 auto;padding:26px 22px 80px 30px;}
  @media(max-width:640px){.wrap{padding:18px 16px 60px 18px;}}

  /* ── header / wordmark ── */
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:26px;}
  .wordmark{display:flex;align-items:baseline;gap:10px;}
  .wordmark .wm-uy{font-family:'Scheherazade New',serif;font-size:1.6rem;color:var(--mulberry);line-height:1;}
  .wordmark .wm-tx{font-size:.82rem;font-weight:600;letter-spacing:.03em;color:var(--ink-soft);}
  .hright{display:flex;gap:10px;align-items:center;}
  .langbtn{
    background:transparent;border:1px solid var(--line-strong);color:var(--ink);
    border-radius:999px;padding:7px 15px;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:500;transition:.15s;
  }
  .langbtn:hover{background:var(--mulberry);color:var(--panel);border-color:var(--mulberry);}
  .langbtn:focus-visible{outline:3px solid var(--saffron);outline-offset:2px;}
  .xpbox{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 15px;font-size:.82rem;color:var(--ink-soft);}
  .xpbox b{color:var(--pome);font-variant-numeric:tabular-nums;}

  /* ── hero ── */
  #introBox{
    position:relative;overflow:hidden;color:var(--panel);border-radius:6px;text-align:center;
    background:radial-gradient(130% 150% at 50% 0%, var(--mulberry) 0%, var(--mulberry-2) 78%);
    padding:50px 52px 46px;margin-bottom:34px;
    box-shadow:0 18px 42px -22px rgba(46,12,32,.7);
  }
  #introBox::after{
    content:"";position:absolute;top:0;right:0;bottom:0;width:20px;opacity:.92;
    background:
      repeating-linear-gradient(-45deg, rgba(0,0,0,.16) 0 5px, transparent 5px 10px),
      repeating-linear-gradient(180deg,
        var(--saffron) 0 24px, var(--pome) 24px 48px, var(--silk) 48px 74px,
        var(--emerald) 74px 100px, var(--lapis) 100px 126px);
  }
  .hero-ey{font-size:.78rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--saffron);margin-bottom:18px;}
  .hero-ey .uy{font-size:1.05rem;letter-spacing:0;}
  .hero-word{font-family:'Scheherazade New',serif;font-size:clamp(2.6rem,8.5vw,5.5rem);line-height:1.12;color:var(--panel);margin-bottom:14px;text-shadow:0 2px 0 rgba(0,0,0,.18);display:inline-block;position:relative;max-width:100%;}
  /* ── 書法運筆特效：墨跡由右往左推進＋毛筆光點 ── */
  @property --rev{syntax:'<length-percentage>';inherits:false;initial-value:0%;}
  .hw-ink{
    display:inline-block;
    --rev:106%; /* 靜止狀態＝完整顯示，動畫只負責「寫出來」的過程 */
    -webkit-mask-image:linear-gradient(to left,#000 var(--rev),transparent calc(var(--rev) + 7%));
    mask-image:linear-gradient(to left,#000 var(--rev),transparent calc(var(--rev) + 7%));
    animation:hw-write 2.6s cubic-bezier(.66,0,.34,1) .35s both;
  }
  /* 由 -7%（連柔邊都在右緣外）寫到 106%（全部寫完）：第一筆也是現場寫出來的 */
  @keyframes hw-write{from{--rev:-7%;}to{--rev:106%;}}
  /* 筆尖觸紙的濕墨光澤：直向、柔邊、低調，跟著筆畫前緣移動（不是物件，只是手感） */
  .hw-tip{
    position:absolute;top:50%;right:0;width:.13em;height:.66em;
    transform:translate(50%,-50%) rotate(-12deg);pointer-events:none;opacity:0;
    background:radial-gradient(50% 50% at 50% 50%,rgba(255,241,212,.85),rgba(226,161,28,.28) 58%,transparent 74%);
    filter:blur(2.5px);mix-blend-mode:screen;
    animation:hw-tip 2.6s cubic-bezier(.66,0,.34,1) .35s both;
  }
  @keyframes hw-tip{
    0%{opacity:0;right:-7%;top:47%;}
    8%{opacity:.8;top:43%;}
    35%{top:60%;}
    62%{top:42%;}
    90%{opacity:.8;top:55%;}
    100%{opacity:0;right:101%;top:49%;}
  }
  @media(prefers-reduced-motion:reduce){
    .hw-ink{-webkit-mask-image:none;mask-image:none;animation:none;}
    .hw-tip{display:none;}
  }
  .hero-rom{font-size:1.05rem;color:var(--saffron);font-weight:500;letter-spacing:.02em;}
  .hero-tr{font-size:1.15rem;color:var(--panel);margin-top:3px;font-weight:500;}
  .hero-kicker{margin:22px auto 0;max-width:42ch;font-size:.95rem;line-height:1.75;color:rgba(243,234,213,.82);}

  /* ── menu groups ── */
  .grp{margin-bottom:30px;}
  .grp-h{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .grp-h span{font-size:.8rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mulberry);white-space:nowrap;}
  .grp-h span .uy{font-size:1.05rem;color:var(--lapis);letter-spacing:0;}
  .grp-h i{flex:1;height:1px;background:var(--line-strong);}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .tiles-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:760px){.tiles,.tiles-4{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.tiles,.tiles-4{grid-template-columns:1fr;}}

  .mcard{
    --tone:var(--lapis);
    position:relative;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--tone);
    border-radius:2px 2px 7px 7px;padding:22px 18px 20px;
    display:flex;flex-direction:column;gap:7px;transition:transform .18s ease, box-shadow .18s ease;
  }
  .mcard:hover{transform:translateY(-4px);box-shadow:0 16px 28px -18px rgba(42,26,34,.55);}
  .mcard:focus-visible{outline:3px solid var(--saffron);outline-offset:2px;}
  .niche{
    width:54px;height:62px;display:flex;align-items:flex-end;justify-content:center;position:relative;margin-bottom:4px;
    background:var(--panel);background:color-mix(in srgb, var(--tone) 16%, var(--panel));
    border:1px solid var(--line);border-color:color-mix(in srgb, var(--tone) 42%, transparent);
    border-radius:27px 27px 5px 5px / 34px 34px 5px 5px;
  }
  .niche::before{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:var(--tone);border-radius:1px;}
  .niche .ic{font-size:1.7rem;line-height:1;padding-bottom:9px;}
  .mc-ey{font-size:.72rem;font-weight:700;letter-spacing:.08em;color:var(--tone);text-transform:uppercase;}
  .mc-t{font-size:1.08rem;font-weight:700;color:var(--ink);}
  .mc-d{font-size:.83rem;line-height:1.6;color:var(--ink-soft);}

  /* ── topbar / buttons / pills ── */
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .btn{background:var(--pome);color:#fff;border:none;border-radius:4px;padding:11px 22px;font-size:.92rem;cursor:pointer;font-family:inherit;font-weight:600;transition:.15s;}
  .btn:hover{filter:brightness(1.08);}
  .btn:focus-visible{outline:3px solid var(--saffron);outline-offset:2px;}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong);}
  .btn.ghost:hover{background:var(--ink);color:var(--panel);filter:none;}
  .btn.gold{background:var(--saffron);color:var(--mulberry);}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 15px;font-size:.83rem;color:var(--ink-soft);}
  .pill b{color:var(--pome);font-variant-numeric:tabular-nums;}
  .hearts{color:var(--pome);letter-spacing:2px;border-color:transparent;background:transparent;}
  .progress{height:7px;border-radius:99px;overflow:hidden;margin-bottom:24px;border:1px solid var(--line);background:#E0D6C4;background:color-mix(in srgb,var(--mulberry) 12%, var(--panel));}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--pome),var(--saffron));width:0;transition:.3s;}

  /* ── quiz card ── */
  .qcard{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--lapis);border-radius:3px 3px 8px 8px;padding:34px 24px;text-align:center;margin-bottom:22px;}
  .qcard .label{font-size:.92rem;color:var(--ink-soft);margin-bottom:18px;line-height:1.7;}
  .qcard .big{font-size:3rem;line-height:1.35;color:var(--ink);}
  .qcard .big.uy{font-size:4rem;color:var(--mulberry);}
  .qcard .sub{font-size:1rem;color:var(--lapis);margin-top:10px;letter-spacing:.02em;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media(max-width:520px){.opts{grid-template-columns:1fr;}}
  .opt{background:var(--panel);border:1px solid var(--line-strong);border-radius:5px;padding:17px 13px;font-size:1.1rem;cursor:pointer;text-align:center;transition:.13s;color:var(--ink);font-family:inherit;}
  .opt .uy{font-size:1.7rem;color:var(--mulberry);}
  .opt small{color:var(--ink-soft);}
  .opt:hover{border-color:var(--lapis);background:var(--panel);background:color-mix(in srgb,var(--lapis) 8%, var(--panel));}
  .opt:focus-visible{outline:3px solid var(--saffron);outline-offset:2px;}
  .opt.correct{background:#D7EBE0;background:color-mix(in srgb,var(--emerald) 18%, var(--panel));border-color:var(--emerald);}
  .opt.wrong{background:#F0D9D4;background:color-mix(in srgb,var(--pome) 16%, var(--panel));border-color:var(--pome);}
  .opt:disabled{cursor:default;}
  .feedback{text-align:center;min-height:64px;margin-top:18px;font-size:.95rem;line-height:1.7;color:var(--ink-soft);}
  .feedback .uy{color:var(--mulberry);font-size:1.3rem;}
  .combo{color:var(--pome);font-weight:700;}

  /* ── memory tiles ── */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media(max-width:520px){.board{gap:7px;}}
  .tile{aspect-ratio:3/4;perspective:700px;cursor:pointer;}
  .tile-inner{position:relative;width:100%;height:100%;transition:transform .35s;transform-style:preserve-3d;}
  .tile.flip .tile-inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:4px 4px 7px 7px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;padding:6px;text-align:center;}
  .face.back{color:var(--saffron);font-size:1.5rem;border:1px solid var(--mulberry-2);
    background:repeating-linear-gradient(45deg, rgba(0,0,0,.12) 0 6px, transparent 6px 12px), radial-gradient(120% 120% at 100% 0,var(--mulberry),var(--mulberry-2));}
  .face.front{background:var(--panel);transform:rotateY(180deg);font-size:.92rem;line-height:1.3;border:1px solid var(--line-strong);color:var(--ink);}
  .face.front .uy{font-size:1.4rem;color:var(--mulberry);}
  .face.front small{color:var(--ink-soft);}
  .tile.done .face.front{background:#D7EBE0;background:color-mix(in srgb,var(--emerald) 20%, var(--panel));border-color:var(--emerald);}
  .tile.done{cursor:default;}

  /* ── letters grid ── */
  .grid-letters{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:12px;}
  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:3px 3px 7px 7px;padding:16px 10px;text-align:center;transition:.15s;}
  .lcard:hover{border-color:var(--saffron);transform:translateY(-2px);}
  .lcard .uy{font-size:2.6rem;color:var(--mulberry);display:block;line-height:1.25;}
  .lcard .latin{font-size:1rem;margin-top:6px;font-weight:600;color:var(--lapis);}
  .lcard .ipa{font-size:.8rem;color:var(--ink-soft);}

  /* ── wordbook ── */
  .wbsec{margin-bottom:8px;}
  .wbsec h3{color:var(--mulberry);margin:26px 0 10px;font-size:.92rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
  .wbsec h3::after{content:"";flex:1;height:1px;background:var(--line);}
  table.wb{width:100%;border-collapse:collapse;}
  table.wb td{padding:10px 8px;border-bottom:1px solid var(--line);font-size:.95rem;}
  table.wb tr:hover td{background:color-mix(in srgb,var(--saffron) 8%,transparent);}
  table.wb td.uy{font-size:1.7rem;text-align:right;width:30%;color:var(--mulberry);}
  table.wb td.latin{color:var(--lapis);width:28%;font-weight:600;}

  /* ── category chips ── */
  .cats{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 24px;}
  .cat{background:var(--panel);border:1px solid var(--line-strong);border-radius:999px;padding:9px 19px;cursor:pointer;font-size:.9rem;color:var(--ink);font-family:inherit;transition:.13s;}
  .cat:hover{border-color:var(--lapis);}
  .cat:focus-visible{outline:3px solid var(--saffron);outline-offset:2px;}
  .cat.sel{border-color:var(--mulberry);background:var(--mulberry);color:var(--panel);}
  #catPrompt{color:var(--ink-soft);margin-bottom:8px;}

  /* ── result ── */
  .result{text-align:center;padding:54px 20px;}
  .result .stars{font-size:3rem;letter-spacing:8px;margin:14px 0;}
  .result h2{font-size:1.7rem;color:var(--mulberry);}
  .result p{color:var(--ink-soft);margin:14px 0 28px;line-height:1.9;}
  .result .uy{color:var(--mulberry);}
  .result .btn{margin:0 5px;}

  /* ── motion ── */
  .hidden{display:none!important;}
  .pop{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .shake{animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
  #introBox,.grp{animation:rise .5s ease both;}
  .grp:nth-of-type(2){animation-delay:.08s;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}

  /* ── 連寫教學 ── */
  .ct-intro{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--saffron);border-radius:3px 7px 7px 3px;padding:16px 18px;font-size:.92rem;line-height:1.8;color:var(--ink);margin-bottom:8px;}
  .ct-intro .hand{font-weight:700;color:var(--pome);}
  .ct-result{text-align:center;margin:22px 0 8px;}
  .ct-result .word{font-size:clamp(3rem,9vw,4.6rem);color:var(--mulberry);line-height:1.3;}
  .ct-result .rom{color:var(--lapis);font-weight:600;letter-spacing:.03em;}
  .ct-result .mean{color:var(--ink-soft);font-size:.9rem;}
  .ct-sec-h{font-size:.88rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mulberry);margin:28px 0 12px;display:flex;align-items:center;gap:10px;}
  .ct-sec-h::after{content:"";flex:1;height:1px;background:var(--line);}
  .ct-asm{display:flex;direction:rtl;justify-content:center;align-items:center;flex-wrap:nowrap;margin:6px 0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px 8px;}
  .ct-tile{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:54px;padding:6px 4px;border-radius:6px;transition:.25s;}
  .ct-tile .g{font-size:clamp(2rem,6vw,2.8rem);color:var(--mulberry);line-height:1.25;}
  .ct-tile .r{font-size:.78rem;color:var(--ink-soft);font-weight:600;}
  .ct-tile.hl{background:color-mix(in srgb,var(--saffron) 16%,var(--panel));}
  .ct-tile.hl .g{text-shadow:0 0 16px rgba(226,161,28,.75);}
  .ct-conn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:40px;align-self:center;margin-top:-14px;}
  .ct-conn .bar{width:26px;height:3px;border-radius:2px;background:var(--line-strong);opacity:.3;transition:.3s;}
  .ct-conn .lab{font-size:.68rem;margin-top:7px;font-weight:700;opacity:0;transition:.3s;white-space:nowrap;}
  .ct-conn.link .bar{background:var(--emerald);opacity:1;height:5px;width:30px;}
  .ct-conn.link .lab{color:var(--emerald);opacity:1;}
  .ct-conn.brk .bar{background:transparent;height:0;border-top:3px dashed var(--pome);width:26px;}
  .ct-conn.brk .lab{color:var(--pome);opacity:1;}
  .ct-caption{text-align:center;min-height:3em;color:var(--ink);font-size:.95rem;line-height:1.65;margin:14px auto 4px;max-width:40ch;}
  .ct-caption b{color:var(--mulberry);}
  .ct-caption .no{color:var(--pome);}
  .ct-caption .uy,.ct-card .uy,.ct-rule .uy,.ct-forms .uy{font-size:1.15em;}
  .ct-replaywrap{text-align:center;margin-top:4px;}
  .ct-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  @media(max-width:680px){.ct-cards{grid-template-columns:1fr 1fr;}}
  .ct-card{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--tone,var(--lapis));border-radius:2px 2px 7px 7px;padding:14px 12px;text-align:center;}
  .ct-card .cg{font-size:2rem;color:var(--mulberry);line-height:1.3;}
  .ct-card .cr{font-weight:700;color:var(--lapis);margin:2px 0 6px;}
  .ct-card .cd{font-size:.8rem;color:var(--ink-soft);line-height:1.65;}
  .ct-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:99px;margin-top:8px;}
  .ct-badge.one{background:color-mix(in srgb,var(--pome) 16%,var(--panel));color:var(--pome);}
  .ct-badge.two{background:color-mix(in srgb,var(--emerald) 18%,var(--panel));color:var(--emerald);}
  .ct-forms{width:100%;border-collapse:collapse;}
  .ct-forms th,.ct-forms td{border:1px solid var(--line);padding:9px 6px;text-align:center;}
  .ct-forms th{color:var(--ink-soft);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em;}
  .ct-forms td.glyph{font-size:1.6rem;color:var(--mulberry);}
  .ct-forms td.name{font-weight:700;color:var(--lapis);}
  .ct-rule{background:color-mix(in srgb,var(--pome) 7%,var(--panel));border:1px solid color-mix(in srgb,var(--pome) 28%,transparent);border-radius:8px;padding:14px 16px;margin-top:14px;font-size:.9rem;line-height:1.8;color:var(--ink);}
  .ct-rule b{color:var(--pome);}
  .ct-rule .uy{font-size:1.5rem;color:var(--mulberry);letter-spacing:.12em;direction:rtl;unicode-bidi:isolate;display:inline-block;}
  .ct-note{font-size:.82rem;color:var(--ink-soft);line-height:1.7;margin-top:10px;}
  /* 辨形互動關卡 */
  .ct-prog{text-align:center;font-size:.76rem;color:var(--ink-soft);margin:12px 0 2px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}

function show(v){VIEWS.forEach(x=>$(x).classList.toggle("hidden",x!==v));window.scrollTo(0,0);}
function goHome(){show("view-home");}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function allWords(){return Object.values(WORDS).flat();}

/* ── 安全存取 localStorage（沙盒環境改用記憶體） ── */
const memStore={};
function safeGet(k){try{return localStorage.getItem(k);}catch(e){return memStore[k]??null;}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){memStore[k]=String(v);}}

/* ── 語言 ── */
let lang="zh";
function T(){return UI[lang];}
function gloss(w){return lang==="ja"?w.ja:w.zh;}
function catName(c){return c==="ALL"?T().catAll:CATNAMES[c][lang];}
function detectLang(){
  const p=new URLSearchParams(location.search).get("lang");
  if(p==="ja"||p==="zh")return p;
  const saved=safeGet("uyghurLang");
  if(saved==="ja"||saved==="zh")return saved;
  return (navigator.language||"").toLowerCase().startsWith("ja")?"ja":"zh";
}
function toggleLang(){lang=lang==="zh"?"ja":"zh";safeSet("uyghurLang",lang);applyLang();goHome();}
function applyLang(){
  const t=T();
  document.documentElement.lang=t.htmlLang;
  document.title=t.title;
  $("appTitle").textContent=t.title;
  $("langBtn").textContent=t.langBtn;
  $("xpLabel").textContent=t.xpLabel;
  $("introBox").innerHTML=`
    <p class="hero-ey">${t.heroEy}</p>
    <div class="hero-word uy" id="heroWord"><span class="hw-ink">ياخشىمۇسىز؟</span><span class="hw-tip" aria-hidden="true"></span></div>
    <p class="hero-rom">Yaxshimusiz?</p>
    <p class="hero-tr">${t.heroGreeting}</p>
    <p class="hero-kicker">${t.heroKicker}</p>`;
  const card=(m,i)=>`<button class="mcard" style="--tone:${MENUMETA[i].tone}" onclick="${m.f}">
      <span class="niche"><span class="ic">${m.e}</span></span>
      <span class="mc-ey">${MENUMETA[i].ey?MENUMETA[i].ey[lang]:t.lessonRange(MENUMETA[i].range)}</span>
      <span class="mc-t">${m.t}</span>
      <span class="mc-d">${m.d}</span></button>`;
  const feat=t.menu[7];
  $("menuBox").innerHTML=
    `<section class="grp"><div class="grp-h"><span>${t.warmup}</span><i></i></div>
       <div class="tiles">${[0,1,6].map(i=>card(t.menu[i],i)).join("")}</div></section>
     <section class="grp"><div class="grp-h"><span>${t.challenge}</span><i></i></div>
       <div class="tiles tiles-4">${[2,3,4,5].map(i=>card(t.menu[i],i)).join("")}</div></section>
     <section class="grp"><div class="grp-h"><span>${t.spellSection}</span><i></i></div>
       <button class="mcard mcard-feature" style="--tone:var(--silk)" onclick="${feat.f}">
         <span class="niche"><span class="ic">${feat.e}</span></span>
         <span class="feat-txt"><span class="mc-t">${feat.t}</span><span class="mc-d">${feat.d}</span></span>
         <span class="feat-go">▶</span>
       </button></section>`;
  document.querySelectorAll(".back-btn").forEach(b=>b.textContent=t.back);
  $("quitBtn").textContent=t.quit;$("memQuit").textContent=t.quit;
  $("lettersPill").textContent=t.lettersPill;
  $("wordbookPill").textContent=t.wordbookPill;
  $("catPrompt").textContent=t.catPrompt;
  $("catGo").textContent=t.go;
  $("scoreLabel").textContent=t.scoreLabel;
  $("movesLabel").textContent=t.movesLabel;
  $("pairsLabel").textContent=t.pairsLabel;
  $("resRetry").textContent=t.retry;
  $("resHome").textContent=t.home;
  if(!$("view-connect").classList.contains("hidden")) showConnect();
  if(!$("view-spell").classList.contains("hidden")) spellBuildUI();

/* ── 經驗值 ── */
function getXP(){return +(safeGet("uyghurXP")||0);}
function addXP(n){safeSet("uyghurXP",getXP()+n);renderXP();}
function renderXP(){$("xpVal").textContent=getXP();$("lvVal").textContent=Math.floor(getXP()/100)+1;}

      {g:ZWJ+"م"+ZWJ,r:"m",d:"両手の文字。左右に隣があるので語中形 ـمـ。",badge:"two",bt:"両手"},
      {g:ZWJ+"ا",r:"a",d:"片手の文字。語尾で前の م を受けて語尾形 ـا。",badge:"one",bt:"片手"},
    ],
  } : {
    pill:"以 ئالما（蘋果）為例",
    intro:`維吾爾文像草寫，字母會連起來；但每個字母會因為<b>左右有沒有鄰居</b>而長成不同的樣子（最多四種）。先把每個字母放進詞裡，猜猜看它會變成哪一種。`,

function ctRender(){
  if(!CTX) return;
  const S=CTX.S;
  document.querySelectorAll("#ctAsm .ct-tile").forEach((t,idx)=>{
    t.classList.toggle("cur", idx===CTX.step && !t.classList.contains("solved"));
  });
  $("ctProg").textContent=S.progress(CTX.step+1,CTX.steps.length);
  $("ctPrompt").innerHTML=S.prompt;
  const fb=$("ctFb"); fb.innerHTML=""; fb.className="ct-fb";
  $("ctNextBtn").style.display="none";
  $("ctOpts").innerHTML=CTX.F.map(f=>
    `<button class="ct-opt" onclick="ctPick(this,'${f.k}')"><span class="on">${f.n}</span><span class="oh">${f.h}</span></button>`).join("");
}
function ctPick(btn,k){
  const st=CTX.steps[CTX.step], S=CTX.S;
  if(k===st.correct){
    document.querySelectorAll("#ctOpts .ct-opt").forEach(b=>b.disabled=true);
    btn.classList.add("ok");
    const tile=document.querySelector(`#ctAsm .ct-tile[data-i="${CTX.step}"]`);
    tile.querySelector(".g").textContent=st.word;
    tile.classList.remove("cur"); tile.classList.add("solved");
    tile.querySelector(".fl").textContent=CTX.F.find(f=>f.k===st.correct).n;
    if(st.conn){
      const c=document.querySelectorAll("#ctAsm .ct-conn")[st.conn.i];
      c.classList.add(st.conn.type);
      c.querySelector(".lab").textContent= st.conn.type==="brk"?CTX.lbl.brk:CTX.lbl.link;
    }
    const fb=$("ctFb"); fb.className="ct-fb good"; fb.innerHTML=S.correct+" "+st.why;
    const nb=$("ctNextBtn"); nb.style.display="";
    nb.textContent=(CTX.step>=CTX.steps.length-1)?S.finish:S.next;
  } else {
    btn.classList.add("no"); btn.disabled=true;
    const fb=$("ctFb"); fb.className="ct-fb"; fb.innerHTML=S.wrong;
  }
}
function ctNext(){
  CTX.step++;
  if(CTX.step>=CTX.steps.length){ ctFinish(); return; }
  ctRender();
}
function ctFinish(){
  const S=CTX.S;
  document.querySelectorAll("#ctAsm .ct-tile").forEach(t=>t.classList.remove("cur"));
  $("ctProg").textContent=S.progress(CTX.steps.length,CTX.steps.length);
  $("ctPrompt").innerHTML="";
  $("ctOpts").innerHTML="";
  const fb=$("ctFb"); fb.className="ct-fb good"; fb.innerHTML=S.doneCap;
  $("ctNextBtn").style.display="none";
}
function ctReset(){ showConnect(); }

/* ═══════════════ 測驗引擎（字母／單字／會話共用） ═══════════════ */
let Q={list:[],idx:0,score:0,hearts:3,combo:0,mode:"",retry:null};

function beginQuiz(list,mode,retryFn){
  Q={list,idx:0,score:0,hearts:3,combo:0,mode,retry:retryFn};
  show("view-quiz");renderQ();
}
function renderQ(){
  const q=Q.list[Q.idx];
  $("quizInfo").textContent=T().qNum(Q.idx+1,Q.list.length);
  $("quizHearts").textContent="❤️".repeat(Q.hearts)+"🖤".repeat(3-Q.hearts);
  $("quizScore").textContent=Q.score;
  $("quizProg").style.width=(Q.idx/Q.list.length*100)+"%";
  $("qLabel").textContent=q.label;
  $("qMain").innerHTML=q.main;
  $("qMain").className="big"+(q.mainUy?" uy":"");
  $("qSub").innerHTML=q.sub||"";
  $("qFeed").innerHTML="";
  $("qOpts").innerHTML="";
  q.opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="opt";b.innerHTML=o.html;
    b.onclick=()=>answer(b,o.ok,q);
    $("qOpts").appendChild(b);
  });
}
function answer(btn,ok,q){
  document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  if(ok){
    btn.classList.add("correct");
    Q.combo++;const bonus=Q.combo>=3?5:0;
    Q.score+=10+bonus;addXP(10+bonus);
    $("qFeed").innerHTML=`${T().correct}${bonus?`<span class="combo"> ${T().combo(Q.combo,bonus)}</span>`:""}<br>${q.note||""}`;
  }else{
    btn.classList.add("wrong");btn.classList.add("shake");
    Q.combo=0;Q.hearts--;
    [...document.querySelectorAll(".opt")].forEach((b,i)=>{
      if(q.opts[i].ok)b.classList.add("correct");
    });
    $("qFeed").innerHTML=`${T().wrong}<br>${q.note||""}`;
    $("quizHearts").textContent="❤️".repeat(Q.hearts)+"🖤".repeat(3-Q.hearts);
  }
  setTimeout(()=>{
    if(Q.hearts<=0)return endQuiz(false);
    Q.idx++;
    if(Q.idx>=Q.list.length)return endQuiz(true);
    renderQ();
  },ok?1400:2600);
}
function endQuiz(finished){
  const total=Q.list.length*10;
  const pct=Q.score/total;
  const stars=!finished?"💔":pct>=0.9?"⭐⭐⭐":pct>=0.6?"⭐⭐":"⭐";
  showResult(
    stars,
    !finished?T().noLife:pct>=0.9?T().great:T().done,
    `${T().resScore(Q.score,total)}${finished?"":T().resStopped(Q.idx+1)}<br>${T().resXP(Q.score)}`,
    Q.retry
  );
}

/* ── 字母挑戰 ── */
function startLetterQuiz(){
  const picks=shuffle(LETTERS).slice(0,10);
  const list=picks.map(L=>{
    const others=shuffle(LETTERS.filter(x=>x.l!==L.l)).slice(0,3);
    if(Math.random()<0.5){
      return{label:T().letterQ1,main:L.u,mainUy:true,
        opts:shuffle([{html:`${L.l}　<span style="color:var(--dim)">${L.ipa}</span>`,ok:true},
          ...others.map(o=>({html:`${o.l}　<span style="color:var(--dim)">${o.ipa}</span>`,ok:false}))]),
        note:`<span class="uy">${L.u}</span> ＝ ${L.l} ${L.ipa}`};
    }else{
      return{label:T().letterQ2,main:`${L.l}　${L.ipa}`,mainUy:false,
        opts:shuffle([{html:`<span class="uy">${L.u}</span>`,ok:true},
          ...others.map(o=>({html:`<span class="uy">${o.u}</span>`,ok:false}))]),
        note:`${L.l} ${L.ipa} ＝ <span class="uy">${L.u}</span>`};
    }
  });
  beginQuiz(list,"letter",startLetterQuiz);
}

/* ── 單字測驗 ── */
function startWordQuiz(){
  const pool=catWords();
  const picks=shuffle(pool).slice(0,Math.min(10,pool.length));
  const list=picks.map(W=>{
    const others=shuffle(pool.filter(x=>x.u!==W.u)).slice(0,3);
    const note=`<span class="uy">${W.u}</span>（${W.l}）＝ ${gloss(W)}　${T().lesson(W.les)}`;
    if(Math.random()<0.5){
      return{label:T().wordQ1,main:W.u,mainUy:true,sub:W.l,
        opts:shuffle([{html:gloss(W),ok:true},...others.map(o=>({html:gloss(o),ok:false}))]),note};
    }else{
      return{label:T().wordQ2(gloss(W)),main:gloss(W),mainUy:false,
        opts:shuffle([{html:`<span class="uy">${W.u}</span><br><small style="color:var(--dim)">${W.l}</small>`,ok:true},
          ...others.map(o=>({html:`<span class="uy">${o.u}</span><br><small style="color:var(--dim)">${o.l}</small>`,ok:false}))]),note};
    }
  });
  beginQuiz(list,"word",startWordQuiz);
}

/* ── 會話挑戰 ── */
function startDialogue(){
  const list=shuffle(DIALOGUES).map(D=>({
    label:D.q[lang],
    main:D.qu,mainUy:true,sub:D.ql,
    opts:shuffle([
      {html:`<span class="uy">${D.a.u}</span><br><small style="color:var(--dim)">${D.a.l}</small>`,ok:true},
      ...D.d.map(o=>({html:`<span class="uy">${o.u}</span><br><small style="color:var(--dim)">${o.l}</small>`,ok:false}))
    ]),
    note:`${T().answerIs}<span class="uy">${D.a.u}</span>（${D.a.l}）＝「${D.a[lang]}」　${T().lesson(D.les)}`
  }));
  beginQuiz(list,"dialogue",startDialogue);
}

/* ═══════════════ 翻翻樂 ═══════════════ */
let M={first:null,lock:false,moves:0,pairs:0};
function startMemory(){
  const picks=shuffle(catWords()).slice(0,8);
  const cards=shuffle(picks.flatMap((w,i)=>[
    {key:i,html:`<span class="uy">${w.u}</span>`},
    {key:i,html:`${gloss(w)}<br><small style="color:var(--dim)">${w.l}</small>`},
  ]));
  M={first:null,lock:false,moves:0,pairs:0};
  $("memMoves").textContent=0;$("memPairs").textContent=0;
  $("memBoard").innerHTML=cards.map(c=>
    `<div class="tile" data-key="${c.key}" onclick="flipTile(this)">
       <div class="tile-inner">
         <div class="face back">❓</div>
         <div class="face front">${c.html}</div>
       </div></div>`).join("");
  show("view-memory");
}
function flipTile(t){
  if(M.lock||t.classList.contains("flip")||t.classList.contains("done"))return;
  t.classList.add("flip");
  if(!M.first){M.first=t;return;}
  M.moves++;$("memMoves").textContent=M.moves;
  const a=M.first,b=t;M.first=null;
  if(a.dataset.key===b.dataset.key){
    a.classList.add("done");b.classList.add("done");
    M.pairs++;$("memPairs").textContent=M.pairs;
    if(M.pairs===8){
      const stars=M.moves<=12?"⭐⭐⭐":M.moves<=18?"⭐⭐":"⭐";
      const xp=M.moves<=12?80:M.moves<=18?60:40;
      addXP(xp);
      setTimeout(()=>showResult(stars,T().memDone,`${T().memMoves(M.moves)}<br>${T().resXP(xp)}`,startMemory),600);
    }
  }else{
    M.lock=true;
    setTimeout(()=>{a.classList.remove("flip");b.classList.remove("flip");M.lock=false;},900);
  }
}

/* ═══════════════ 結果頁 ═══════════════ */
function showResult(stars,title,detail,retryFn){
  $("resStars").textContent=stars;
  $("resTitle").textContent=title;
  $("resDetail").innerHTML=detail;
  $("resRetry").onclick=retryFn;
  show("view-result");
}

/* ═══════════════ 拼字遊戲：連寫拼接台（自由拼接，看 shaping） ═══════════════ */
// 字形 → 讀音（含帶載體與不帶載體的母音）
const TILE_ROM={
  "ئا":"a","ا":"a","ئە":"e","ە":"e","ب":"b","پ":"p","ت":"t","ج":"j","چ":"ch","خ":"x",
  "د":"d","ر":"r","ز":"z","ژ":"zh","س":"s","ش":"sh","غ":"gh","ف":"f","ق":"q","ك":"k",
  "گ":"g","ڭ":"ng","ل":"l","م":"m","ن":"n","ھ":"h","ئو":"o","و":"o","ئۇ":"u","ۇ":"u",
  "ئۆ":"ö","ۆ":"ö","ئۈ":"ü","ۈ":"ü","ۋ":"w","ئې":"ë","ې":"ë","ئى":"i","ى":"i","ي":"y",
};
// 字母庫：單碼點基本字母 + 字首母音（含載體 ئ，兩碼點）
const SP_BASE=["ا","ە","ب","پ","ت","ج","چ","خ","د","ر","ز","ژ","س","ش","غ","ف","ق","ك","گ","ڭ","ل","م","ن","ھ","و","ۇ","ۆ","ۈ","ۋ","ې","ى","ي"];
const SP_CARRIED=["ئا","ئە","ئو","ئۇ","ئۆ","ئۈ","ئې","ئى"];

function spellTexts(){
  return lang==="ja" ? {
    pill:"文字つなぎ台",
    intro:`同じ単語でも、<b>保存されるのは線形のコードポイント列</b>（stored codepoints）。でも <b>shaping engine</b> がそれを一続きの筆画に整形します——文字を足すたび、前の文字が形を「交渉」し直します。下の文字を自由に押してみよう。`,
    inst:`下の文字を押してコードポイント順に追加。いつでも「戻る・クリア」でいろいろな組み合わせを試せます。`,
    baseCap:"基本の文字（1コードポイント）", carriedCap:"語頭母音（台 ئ つき・2コードポイント）",
    rendered:"SHAPING ENGINE による表示", stored:"保存されたコードポイント",
    renderedIso:"SHAPING ENGINE なし：独立形を強制", isoBtn:"✂ 独立形を強制", normBtn:"↩ 通常の連結",
    isoHint:"同じコードポイントでも、文字がバラバラに——shaping engine が無いとこうなります。",
    placeholder:"文字を押して始めよう…", back:"戻る", clear:"クリア",
    tryTitle:"この単語をつづってみよう", shuffleBtn:"🔄 別の語", targetLabel:"お題：", matched:"つづれた！",
    xp:n=>`経験値 +${n}`,
    note:`アラビア文字組版についての記事に着想を得ています：<a href="https://lr0.org/blog/p/arabic/" target="_blank" rel="noopener">lr0.org/blog/p/arabic</a>。4つのコードポイントが保存されても、画面では一続きの字に——shaping engine が無ければ（独立形しか出せないPDF生成器など）、同じコードポイントが4つのバラバラな独立形になります。`,
  } : {
    pill:"連寫拼接台",
    intro:`同一個詞，<b>儲存的是一串線性碼點</b>（stored codepoints），但 <b>shaping engine</b> 會把它們排成一條連續的筆畫——每加一個字母，前面的字母都會重新「協商」自己的形狀。下面自由點字母拼拼看。`,
    inst:`點下面的字母，依碼點順序加進詞裡；可隨時「倒退」或「清除」，反覆嘗試不同組合。`,
    baseCap:"基本字母（單一碼點）", carriedCap:"字首母音（含載體 ئ，兩個碼點）",
    rendered:"SHAPING ENGINE 排出的樣子", stored:"儲存的碼點",
    renderedIso:"沒有 SHAPING ENGINE：強制獨立形", isoBtn:"✂ 強制獨立形", normBtn:"↩ 回到正常連寫",
    isoHint:"同樣的碼點，字母卻各自分開、不相連——這就是沒有排版引擎時的樣子。",
    placeholder:"點字母開始拼…", back:"倒退", clear:"清除",
    tryTitle:"試試拼出這些詞", shuffleBtn:"🔄 換一批", targetLabel:"目標：", matched:"拼出來了！",
    xp:n=>`經驗值 +${n}`,
    note:`靈感與概念出自一篇談阿拉伯文排版的文章：<a href="https://lr0.org/blog/p/arabic/" target="_blank" rel="noopener">lr0.org/blog/p/arabic</a>。四個碼點存在記憶體裡，畫面上卻是一筆連成的字——沒有 shaping engine（例如某些只會輸出獨立形的 PDF 產生器），同樣的碼點就會變成四個各自分開的獨立形。`,
  };
}
let SP=null;
function startSpell(){
  const pool=allWords().filter(w=>{const n=[...w.u].length; return n>=3 && n<=6;});
  const sugg=shuffle(pool).slice(0,6);
  SP={seq:[],target:null,sugg,scored:new Set(),iso:false};
  show("view-spell");
  spellBuildUI();
}
function cpList(str){ return [...str].map(c=>"U+"+c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0")); }
function spellBuildUI(){
  if(!SP) return;
  const X=spellTexts();
  $("spellPill").textContent=X.pill;
  const tile=u=>`<button class="sp-tile" onclick="spellAdd('${u}')"><span class="g uy">${u}</span><span class="rr">${TILE_ROM[u]||""}</span></button>`;
  const suggHTML=spellSuggHTML();
  $("spellBody").innerHTML=`
    <div class="spr-intro">${X.intro}</div>
    <div class="spr-inst">${X.inst}</div>
    <div class="spr-bankgrp">
      <div class="spr-bankcap">${X.baseCap}</div>
      <div class="sp-bank">${SP_BASE.map(tile).join("")}</div>
      <div class="spr-bankcap">${X.carriedCap}</div>
      <div class="sp-bank">${SP_CARRIED.map(tile).join("")}</div>
    </div>
    <div class="spr-target" id="sprTarget"></div>
    <div class="spr-stage">
      <div class="spr-render">
        <div class="spr-cap" id="sprRenderCap">${X.rendered}</div>
        <div class="spr-word uy empty" id="sprWord"></div>
      </div>
      <div class="spr-ctrls">
        <button class="btn ghost" onclick="spellBack()">⌫ ${X.back}</button>
        <button class="btn ghost" onclick="spellClear()">${X.clear}</button>
        <button class="btn ghost" id="sprIsoBtn" onclick="spellIso()">${X.isoBtn}</button>
      </div>
    </div>
    <div class="spr-isohint" id="sprIsoHint"></div>
    <div class="spr-cpsrow"><span class="spr-cap">${X.stored}</span><br><span class="spr-cps" id="sprCps"></span></div>
    <div class="spr-fb" id="sprFb"></div>
    <div class="spr-sugghead"><span>${X.tryTitle}</span><i></i><button class="spr-shuffle" onclick="spellShuffleSugg()">${X.shuffleBtn}</button></div>
    <div class="spr-sugg" id="sprSugg">${suggHTML}</div>
    <div class="spr-note">${X.note}</div>`;
  spellRender();
}
function spellSuggHTML(){
  return SP.sugg.map((w,i)=>`<button class="spr-chip" data-i="${i}" onclick="spellTarget(${i})"><span class="cr">${w.l}</span> ${gloss(w)}</button>`).join("");
}
function spellShuffleSugg(){
  if(!SP)return;
  const pool=allWords().filter(w=>{const n=[...w.u].length; return n>=3 && n<=6;});
  const prev=new Set(SP.sugg.map(w=>w.u));
  let pick=shuffle(pool).slice(0,6);
  // 盡量換成不一樣的一批
  if(pool.length>6 && pick.every(w=>prev.has(w.u))) pick=shuffle(pool.filter(w=>!prev.has(w.u))).slice(0,6);
  SP.sugg=pick; SP.target=null;
  $("sprSugg").innerHTML=spellSuggHTML();
  spellRender();
}
function spellAdd(u){ if(!SP)return; SP.seq.push(u); spellRender(); }
function spellBack(){ if(!SP||!SP.seq.length)return; SP.seq.pop(); spellRender(); }
function spellClear(){ if(!SP)return; SP.seq=[]; spellRender(); }
function spellIso(){ if(!SP)return; SP.iso=!SP.iso; spellRender(); }
function spellTarget(i){
  if(!SP)return;
  SP.target = (SP.target===SP.sugg[i]) ? null : SP.sugg[i];
  spellRender();
}
function spellRender(){
  if(!SP) return;
  const X=spellTexts();
  const built=SP.seq.join("");
  const wordEl=$("sprWord");
  // 強制獨立形＝在每個字母間插入 ZWNJ（U+200C），騙字型「這裡別連」，模擬沒有 shaping engine
  const disp = SP.iso ? [...built].join("‌") : built;
  if(built){ wordEl.textContent=disp; wordEl.classList.remove("empty"); }
  else { wordEl.textContent=X.placeholder; wordEl.classList.add("empty"); }
  wordEl.classList.toggle("iso", SP.iso && !!built);
  $("sprRenderCap").textContent = SP.iso ? X.renderedIso : X.rendered;
  $("sprIsoBtn").textContent = SP.iso ? X.normBtn : X.isoBtn;
  $("sprIsoHint").innerHTML = (SP.iso && built) ? X.isoHint : "";
  const cps=cpList(built);
  $("sprCps").innerHTML = cps.length? cps.join(" ") : `<span class="empty">—</span>`;
  document.querySelectorAll("#sprSugg .spr-chip").forEach((c,j)=>c.classList.toggle("sel", SP.sugg[j]===SP.target));
  const tEl=$("sprTarget");
  tEl.innerHTML = SP.target ? `${X.targetLabel} <span class="uy">${SP.target.u}</span> · <b>${SP.target.l}</b> · ${gloss(SP.target)}` : "";
  const fb=$("sprFb");
  if(SP.target && built===SP.target.u){
    let msg=`✓ ${X.matched}`;
    if(!SP.scored.has(SP.target.u)){ SP.scored.add(SP.target.u); addXP(12); msg+=`　${X.xp(12)}`; }
    fb.className="spr-fb win"; fb.innerHTML=msg;
  } else { fb.className="spr-fb"; fb.innerHTML=""; }
}


/* ═══════════════ 初始化 ═══════════════ */
lang=detectLang();
applyLang();
renderXP();
</script>
